<body>
<div class="header">
  <div class="sub">Gruppe 5 · v1.0</div>
  <div class="title">Boarding Pass</div>
</div>
<div class="main" id="main">
  <button class="upload-btn" onclick="document.getElementById('pdfIn').click()">
    <span class="upload-icon">📄</span>
    <span>Ticket-PDF hochladen</span>
    <span style="font-size:12px;color:#555">Claude liest alle Infos + Barcode automatisch aus</span>
  </button>
</div>
<input type="file" id="pdfIn" accept=".pdf" onchange="handleUpload(event)" style="display:none">

<script>
const apiKey = localStorage.getItem('bp_apikey') || '';
let tickets = JSON.parse(localStorage.getItem('bp_tickets') || '[]');
let db = null;

// IndexedDB for PDFs and barcodes
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('bp_store',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('files',{keyPath:'id'});r.onsuccess=e=>res(e.target.result);r.onerror=rej;});}
function dbSave(id,data){if(!db)return;db.transaction('files','readwrite').objectStore('files').put({id,data});}
function dbLoad(id){return new Promise(res=>{if(!db)return res(null);const r=db.transaction('files','readonly').objectStore('files').get(id);r.onsuccess=e=>res(e.target.result?.data||null);r.onerror=()=>res(null);});}
function dbDel(id){if(!db)return;db.transaction('files','readwrite').objectStore('files').delete(id);}

function save(){try{localStorage.setItem('bp_tickets',JSON.stringify(tickets));}catch(e){}}

async function init(){
  db = await openDB().catch(()=>null);
  render();
}

function getKey(){
  const k = localStorage.getItem('bp_apikey')||'';
  if(k) return k;
  const inp = prompt('Anthropic API Key eingeben:');
  if(inp){localStorage.setItem('bp_apikey',inp);return inp;}
  return null;
}

async function handleUpload(event){
  const file = event.target.files[0];
  if(!file) return;
  event.target.value='';

  const key = getKey();
  if(!key) return;

  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading"><div class="loading-icon">⏳</div><div style="font-size:15px;font-weight:500;color:#f0f0f0;margin-bottom:6px">Claude liest das Ticket…</div><div>~10 Sekunden</div></div>';

  const reader = new FileReader();
  reader.onload = async(e) => {
    const b64full = e.target.result; // data:application/pdf;base64,...
    const b64data = b64full.split(',')[1];

    // 1. Ask Claude to extract all flight data
    const PROMPT = `Du liest einen Boarding Pass als PDF. Das PDF kann MEHRERE Flüge enthalten.
Gib NUR reines JSON zurück — ein Array mit einem Objekt pro Flug:
[{
  "from": "Abflughafen-Code (z.B. DUS)",
  "from_name": "Stadtname (z.B. Düsseldorf)",
  "to": "Zielflughafen-Code (z.B. LIS)",
  "to_name": "Stadtname (z.B. Lissabon)",
  "date": "YYYY-MM-DD",
  "weekday": "Wochentag auf Deutsch",
  "flight": "Flugnummer (z.B. TP541)",
  "dep": "Abflugzeit HH:MM",
  "boarding": "Boarding-Zeit HH:MM",
  "gate": "Gate",
  "seat": "Sitz (z.B. 22A)",
  "class": "Klasse (Y/C/F)",
  "zone": "Boarding Zone",
  "airline": "Airline Name",
  "passenger": "Nachname/Vorname"
}]
Fehlende Felder als leeren String. Nur JSON, nichts anderes.`;

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-beta':'pdfs-2024-09-25'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64data}},{type:'text',text:PROMPT}]}]})
      });
      const data = await resp.json();
      if(data.error) throw new Error(data.error.message);
      let flights = JSON.parse(data.content?.[0]?.text.replace(/```json|```/g,'').trim()||'[]');
      if(!Array.isArray(flights)) flights=[flights];

      // 2. Extract barcode: find largest wide image in upper third of page
      // We do this by rendering with the approach of asking Claude which image IS the barcode
      // But actually: we just store the PDF and crop it on display using canvas
      const pdfId = 'pdf_'+Date.now();
      dbSave(pdfId, b64full);

      // 3. Try to extract barcode image via canvas rendering
      const barcodeB64 = await extractBarcode(b64full);
      const bcId = barcodeB64 ? 'bc_'+Date.now() : null;
      if(barcodeB64 && bcId) dbSave(bcId, barcodeB64);

      flights.forEach((f,i) => {
        tickets.push({...f, pdfId, bcId: i===0 ? bcId : null, id:'t_'+Date.now()+'_'+i});
      });
      save(); render();

    } catch(err) {
      main.innerHTML = '<div class="error"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div>'+err.message+'</div></div>';
    }
  };
  reader.readAsDataURL(file);
}

// Extract barcode from PDF using canvas + pdf.js via CDN (with fallback)
async function extractBarcode(pdfB64full){
  // Strategy: render the PDF page, find the dense barcode region in upper 30%
  return new Promise(async resolve => {
    try {
      // Load pdf.js dynamically
      if(!window.pdfjsLib){
        await new Promise((res,rej)=>{
          const s=document.createElement('script');
          s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
          s.onload=res; s.onerror=rej;
          document.head.appendChild(s);
        });
        // Use fake worker to avoid separate worker file fetch
        const workerBlob = new Blob([`
          // Minimal PDF.js worker stub
        `], {type:'application/javascript'});
        pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(workerBlob);
      }

      const b64data = pdfB64full.split(',')[1];
      const raw = atob(b64data);
      const arr = new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);

      const pdf = await pdfjsLib.getDocument({data:arr, useWorkerFetch:false, isEvalSupported:false, useSystemFonts:true}).promise;
      const page = await pdf.getPage(1);
      const vp = page.getViewport({scale:3});

      const canvas = document.createElement('canvas');
      canvas.width = vp.width;
      canvas.height = vp.height;
      const ctx = canvas.getContext('2d');
      await page.render({canvasContext:ctx, viewport:vp}).promise;

      // Scan upper 35% for barcode (wide dark region)
      const scanH = Math.floor(vp.height * 0.35);
      const imgData = ctx.getImageData(0, 0, vp.width, scanH);
      const region = findBarcodeRegion(imgData, vp.width, scanH);

      if(region){
        const bc = document.createElement('canvas');
        bc.width = region.w;
        bc.height = region.h;
        bc.getContext('2d').putImageData(
          ctx.getImageData(region.x, region.y, region.w, region.h), 0, 0
        );
        resolve(bc.toDataURL('image/png'));
      } else {
        resolve(null);
      }
    } catch(e) {
      console.warn('Barcode extract failed:', e);
      resolve(null);
    }
  });
}

function findBarcodeRegion(imgData, W, H){
  const d = imgData.data;
  // For each row, count dark pixels
  const rowDark = [];
  for(let y=0;y<H;y++){
    let dark=0;
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      if((d[i]+d[i+1]+d[i+2])/3 < 100) dark++;
    }
    rowDark.push(dark/W);
  }
  // Find band of rows where 3-70% of pixels are dark (barcode pattern)
  let best={start:0,len:0}, cur={start:0,len:0};
  for(let y=0;y<H;y++){
    if(rowDark[y]>0.03 && rowDark[y]<0.75){
      if(cur.len===0) cur.start=y;
      cur.len++;
    } else {
      if(cur.len > best.len) best={...cur};
      cur={start:0,len:0};
    }
  }
  if(cur.len>best.len) best=cur;
  if(best.len < 15) return null;

  // Find horizontal extent
  let xMin=W, xMax=0;
  for(let y=best.start;y<best.start+best.len;y++){
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      if((d[i]+d[i+1]+d[i+2])/3 < 100){
        xMin=Math.min(xMin,x); xMax=Math.max(xMax,x);
      }
    }
  }
  const pad=10;
  return {
    x:Math.max(0,xMin-pad), y:Math.max(0,best.start-pad),
    w:Math.min(W,xMax-xMin+pad*2), h:best.len+pad*2
  };
}

function render(){
  const main = document.getElementById('main');
  const sorted = [...tickets].sort((a,b)=>a.date.localeCompare(b.date));

  let html = `<button class="upload-btn" onclick="document.getElementById('pdfIn').click()">
    <span class="upload-icon">📄</span>
    <span>Weiteres Ticket hinzufügen</span>
  </button>`;

  sorted.forEach((t,si) => {
    const realIdx = tickets.findIndex(x=>x.id===t.id);
    const wt = t.date ? new Date(t.date+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'}) : '';
    html += `<div class="ticket-card">
      <div class="ticket-header">
        <div class="route">
          ${t.from||'?'} <span class="arrow">→</span> ${t.to||'?'}
        </div>
        <div class="date-line">${t.weekday||''} · ${wt} · ${t.airline||''} ${t.flight||''}</div>
      </div>
      ${t.passenger?`<div class="name-row">Passagier: <span>${t.passenger}</span></div>`:''}
      <div class="details">
        <div class="detail"><div class="d-label">Abflug</div><div class="d-value">${t.dep||'—'}</div></div>
        <div class="detail"><div class="d-label">Boarding</div><div class="d-value">${t.boarding||'—'}</div></div>
        <div class="detail"><div class="d-label">Gate</div><div class="d-value accent">${t.gate||'—'}</div></div>
        <div class="detail"><div class="d-label">Sitz</div><div class="d-value accent">${t.seat||'—'}</div></div>
        <div class="detail"><div class="d-label">Klasse</div><div class="d-value">${t.class||'—'}</div></div>
        <div class="detail"><div class="d-label">Zone</div><div class="d-value">${t.zone||'—'}</div></div>
      </div>
      ${t.bcId ? `<div class="barcode-section" id="bc_${realIdx}"><div style="color:#aaa;font-size:12px">Barcode wird geladen…</div></div>` : `<div class="barcode-section"><div style="color:#aaa;font-size:12px">Kein Barcode gefunden — PDF öffnen</div></div>`}
      ${t.pdfId ? `<button class="pdf-btn" onclick="openPdf('${t.pdfId}')">📄 Original-Ticket öffnen</button>` : ''}
      <button class="del-btn" onclick="deleteTicket(${realIdx})">🗑 Ticket löschen</button>
    </div>`;
  });

  main.innerHTML = html;

  // Load barcodes async
  sorted.forEach(t => {
    const realIdx = tickets.findIndex(x=>x.id===t.id);
    if(t.bcId){
      dbLoad(t.bcId).then(img => {
        const el = document.getElementById('bc_'+realIdx);
        if(el && img){
          el.innerHTML = `<img src="${img}" class="barcode-img" alt="Barcode"><div class="barcode-label">Am Scanner vorzeigen</div>`;
        } else if(el){
          el.innerHTML = '<div style="color:#aaa;font-size:12px">Barcode nicht geladen</div>';
        }
      });
    }
  });
}

async function openPdf(pdfId){
  const d = await dbLoad(pdfId);
  if(!d){alert('PDF nicht gespeichert.');return;}
  const b=atob(d.split(',')[1]), a=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++) a[i]=b.charCodeAt(i);
  window.open(URL.createObjectURL(new Blob([a],{type:'application/pdf'})),'_blank');
}

function deleteTicket(idx){
  if(!confirm('Ticket löschen?')) return;
  const t=tickets[idx];
  if(t.pdfId) dbDel(t.pdfId);
  if(t.bcId) dbDel(t.bcId);
  tickets.splice(idx,1);
  save(); render();
}

init();
</script>
